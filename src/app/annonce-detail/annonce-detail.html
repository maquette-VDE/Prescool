<div class="container py-5">
  @if (projet()) {
  <div class="card p-4">
    <h2 class="fw-bold">{{ projet().titre }}</h2>
    <img [src]="projet().imageUrl" class="img-fluid rounded my-3" style="max-height: 300px;">

    <div class="mt-3">
      <span class="badge bg-primary mb-2">{{ projet().categorie }}</span>
      <p class="lead">{{ projet().description }}</p>
      <p class="text-muted small">Publié le : {{ projet().date | date:'dd/MM/yyyy' }}</p>
    </div>

    <div class="mt-4">
      <button routerLink="/sidenav/annonces" class="btn btn-secondary btn-sm">
        ← Retour à la liste
      </button>
    </div>annonces
  </div>
  } @else {
  <div class="alert alert-warning">
    Projet introuvable ou en cours de chargement...
  </div>
  }
</div>
