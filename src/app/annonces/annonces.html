<div class="container mt-4">
  <h2 class="mb-4">Dernières Annonces</h2>

  <div class="row">
    @for (item of annonces(); track item.id) {
    <div class="col-md-4 mb-4">
      <div class="card h-100 shadow-sm">
        <img [src]="item.imageUrl" class="card-img-top" alt="Image annonce">

        <div class="card-body">
          <h5 class="card-title">{{ item.titre }}</h5>
          <p class="text-muted small">{{ item.categorie }}</p>
          <p class="card-text text-truncate">{{ item.description }}</p>
          <div class="d-grid mt-3">
            <button [routerLink]="['/sidenav/annonces', item.id]" class="btn btn-primary btn-sm">
              Voir ce projet
            </button>
          </div>
        </div>

        <div class="card-footer text-muted small">
          Publié le {{ item.date | date:'dd/MM/yyyy' }}
        </div>
      </div>
    </div>
    } @empty {
    <p class="text-center">Aucune annonce disponible pour le moment.</p>
    }
  </div>
</div>
