<div class="bg-screen">
  <div class="connexion shadow-sm text-center">
    <h2 class="mb-3">Mot de passe oublié ?</h2>
    <p class="text-muted mb-4">
      Entrez votre adresse email pour recevoir un lien de réinitialisation.
    </p>

    <form (ngSubmit)="onSubmit()" #forgotForm="ngForm" *ngIf="!isSubmitted">
      <div class="mb-4 text-start">
        <label for="email" class="form-label ms-2">Adresse Email</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          class="form-control" 
          [(ngModel)]="email" 
          required 
          email
          placeholder="nom@exemple.com">
      </div>

      <button 
        type="submit" 
        [disabled]="forgotForm.invalid || isLoading" 
        class="login">
        {{ isLoading ? 'Envoi en cours...' : 'Envoyer le lien' }}
      </button>
    </form>

    <div *ngIf="isSubmitted" class="alert alert-success mt-3 border-0" style="border-radius: 15px;">
      Un email a été envoyé à <strong>{{ email }}</strong>.
    </div>
  </div>
</div>
